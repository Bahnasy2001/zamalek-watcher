name: 🤍🩵 Zamalek Ticket Watcher

on:
  repository_dispatch:
    types: [run-watcher]
  schedule:
    - cron: "* * * * *"   
  workflow_dispatch:         
jobs:
  watch:
    runs-on: ubuntu-latest
    timeout-minutes: 4

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install requests

      # ── Restore seen matches cache ──
      - name: Restore cache
        uses: actions/cache@v4
        with:
          path: seen_zamalek_matches.json
          key: seen-matches-${{ runner.os }}
          restore-keys: seen-matches-

      # ── Run ──
      - name: Run Watcher
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_IDS: ${{ secrets.TELEGRAM_CHAT_IDS }}
        run: python zamalek_watcher.py --once

      # ── Save cache ──
      - name: Save cache
        if: always()
        uses: actions/cache@v4
        with:
          path: seen_zamalek_matches.json
          key: seen-matches-${{ runner.os }}-${{ github.run_id }}
